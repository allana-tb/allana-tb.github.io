    <body>
        <!--------======================= HEADER ==============================-->


        <!--------======================= CONTACT FORM ==============================-->
        <div class="background">
        <div class="container">
            <div class="screen">
              <div class="screen-header">
                <div class="screen-header-left">
                  <div class="screen-header-button close" onclick="history.back()"></div>
                  <div class="screen-header-button maximize"></div>
                  <div class="screen-header-button minimize"></div>
                </div>
              </div>
              <div class="screen-body">
                <div class="screen-body-item left">
                  <div class="app-title">
                    <span>REACH</span>
                    <span>ME AT:</span>
                  </div>
                  <div id="nets" class="icon" style="font-size:xx-large; padding-top: 50px; letter-spacing: 10px; ">
                    <a id = "linkedin" href="https://www.linkedin.com/in/allanatavares/"><i class="bi bi-linkedin"></i></a><br>
                    <a id = "github" href="https://github.com/allana-tb"><i class="bi bi-github"></i></a><br>
                    <a id = "email" href="mailto:allanatavaresb@gmail.com"><i class="bi bi-envelope-fill"></i></a><br>
                  </div>
                </div>
                <div class="screen-body-item">
                  <form class="gform pure-form pure-form-stacked" method="POST" data-email="example@email.net" 
                  action="https://script.google.com/macros/s/AKfycbzt3SntANyCx1XLuNepEirbZfwceOy5Ox366sj1SKX93ZVEGJVBGQXFAkTRPZAZjJ9IeA/exec">
                    <div class="form-elements">
                      <input class="app-form-control" placeholder="YOUR NAME" name="name" id="name" type="text">
                    </div>
                    <div class="form-elements">
                      <input class="app-form-control" placeholder="YOUR EMAIL" name="email" id="email" type="email">
                    </div>
                    <div class="form-elements">
                      <textarea class="app-form-control" placeholder="Write something here..." name="message" id="messsage" type="text"></textarea>
                    </div>
                    <div class="app-form-group buttons">
                      <button class="app-form-button" onclick="history.back()">CANCEL</button>
                      <button class="app-form-button" type="submit" name="submit" value="send" >SEND</button>
                    </div>
                    <div class="thankyou_message" style="display:none;">
                      <h2>Thanks for the message!
                        I will get back to you soon! :) </h2>
                    </div>
                  </form>

                  <!-- Submit the Form to Google Using "AJAX" -->
                  <script data-cfasync="false" src="JS/form-submission-handler.js"></script>

                </div>
              </div>
            </div>

                  </g>

                Gururaj
